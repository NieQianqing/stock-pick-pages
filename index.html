<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>高股息梯度选股（静态快照）</title>
<style>
/* ============================================================
   高股息梯度选股 H5 —— 极简商务风，1:1 复刻示例截图表格
   ============================================================ */
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --red: #d81e06;          /* 首仓/触发档位红字 */
  --text: #1f1f1f;
  --text-gray: #999;
  --line: #eee;
  --bg: #fff;
  --header-bg: #fafafa;
  --accent: #c62828;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  font-size: 14px;
  display: flex;
  flex-direction: column;
}

/* ---------- 顶部工具栏 ---------- */
.topbar {
  position: sticky; top: 0; z-index: 20;
  background: var(--bg);
  border-bottom: 1px solid var(--line);
  padding: 10px 12px 8px;
}
.title-row { display: flex; align-items: baseline; justify-content: space-between; }
.app-title { font-size: 16px; font-weight: 700; }
.trade-date { font-size: 12px; color: var(--text-gray); }

.filter-row {
  display: flex; gap: 8px; overflow-x: auto; margin-top: 8px; padding-bottom: 2px;
}
.filter-row::-webkit-scrollbar { display: none; }
.chip {
  flex: 0 0 auto; padding: 5px 12px; border-radius: 14px;
  background: #f2f2f2; color: #555; font-size: 13px; border: none; cursor: pointer;
  white-space: nowrap;
}
.chip.active { background: var(--accent); color: #fff; }
/* 「核心」按钮：未选中时也用描边高亮，突出它是常用快捷筛选 */
.chip-core { border: 1px solid var(--accent); color: var(--accent); background: #fff; font-weight: 600; }
.chip-core.active { background: var(--accent); color: #fff; }

.action-row { display: flex; gap: 8px; margin-top: 8px; align-items: center; flex-wrap: wrap; }
.search-input {
  flex: 1 1 140px; min-width: 120px; padding: 6px 10px; border: 1px solid #ddd; border-radius: 8px;
  font-size: 13px; background: #fff; color: #333;
}
.search-input:focus { outline: none; border-color: var(--accent); }
.date-select {
  flex: 0 0 auto; min-width: 110px; padding: 6px 8px; border: 1px solid #ddd; border-radius: 8px;
  font-size: 13px; background: #fff; color: #333;
}
.btn {
  flex: 0 0 auto; padding: 6px 14px; border: none; border-radius: 8px;
  background: var(--accent); color: #fff; font-size: 13px; cursor: pointer;
}
.btn-ghost { background: #fff; color: var(--accent); border: 1px solid var(--accent); }
.btn:disabled { opacity: .5; }

/* ---------- 表格 ---------- */
/* 截图区域为整体纵向滚动容器；单个表格内部横向滚动 */
#captureArea { flex: 1; overflow: auto; -webkit-overflow-scrolling: touch; }
.table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.stock-table {
  width: 100%; border-collapse: collapse; min-width: 620px;
}
.stock-table thead th {
  position: sticky; top: 0; z-index: 10;
  background: var(--header-bg); color: #666; font-weight: 600;
  font-size: 13px; text-align: center; padding: 10px 4px;
  border-bottom: 1px solid var(--line); white-space: nowrap;
}
.stock-table tbody td {
  padding: 12px 4px; text-align: center; vertical-align: middle;
  border-bottom: 1px solid var(--line); font-size: 13px;
}
.stock-table tbody tr:active { background: #fafafa; }
/* 已达首仓价：整行浅底 + 名称标红，方便一眼看到置顶标的 */
.stock-table tbody tr.row-hit { background: #fff5f5; }
.stock-table tbody tr.row-hit .stock-name { color: var(--red); }
.stock-table tbody tr.row-main { cursor: pointer; }
.stock-table tbody tr.row-priority { box-shadow: inset 3px 0 0 #d9a441; }
.stock-table tbody tr.row-main.expanded { background: #f7f7f7; }
.stock-table tbody tr.row-expand td { padding: 0 10px 12px; text-align: left; background: #fafafa; }
.metrics-box {
  display: grid; gap: 12px; padding: 14px;
  background: #f4f6f8; border: 1px solid #e5e8ec; border-radius: 12px;
}
.metric-summary {
  display: grid; grid-template-columns: 1.4fr repeat(4, 1fr); gap: 8px;
}
.metric-summary > div {
  display: flex; flex-direction: column; justify-content: center;
  min-height: 54px; padding: 8px 12px; background: #fff;
  border: 1px solid #e6e8eb; border-radius: 10px;
}
.metric-summary strong { font-size: 15px; color: #222; }
.metric-summary small { margin-top: 3px; color: #888; font-size: 11px; }
.metric-summary .metric-score strong { font-size: 22px; }
.metric-section {
  padding: 10px 12px 12px; background: #fff; border: 1px solid #e6e8eb; border-radius: 10px;
}
.metric-section h4 {
  margin: 0 0 9px; font-size: 13px; color: #333;
}
.metric-grid { display: flex; flex-wrap: wrap; gap: 7px; }
.metric-foot {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  color: #888; font-size: 11px;
}
.metric-pill {
  display: inline-block; background: #fff; border: 1px solid #e6e6e6;
  border-radius: 14px; padding: 5px 10px; font-size: 12px; color: #333;
  white-space: nowrap;
}
.metric-pill b { font-weight: 600; color: #666; margin-right: 4px; }
.metric-good { color: #287a48; background: #f2fbf5; border-color: #cde9d6; }
.metric-warn { color: #986400; background: #fff9e9; border-color: #eedda9; }
.metric-bad { color: #b33a32; background: #fff4f3; border-color: #efcfcc; }
.metric-pill.metric-good b,
.metric-pill.metric-warn b,
.metric-pill.metric-bad b { color: inherit; }
.btn-div-hist {
  border: 1px solid var(--accent); background: #fff; color: var(--accent);
  border-radius: 14px; padding: 5px 12px; font-size: 12px; cursor: pointer;
}
@media (max-width: 720px) {
  .metric-summary { grid-template-columns: 1fr 1fr; }
  .metric-foot { align-items: flex-start; flex-direction: column; }
}

/* 列宽分配（9 列） */
.col-name    { width: 14%; }
.col-score   { width: 9%; }
.col-price   { width: 8%; }
.col-yield   { width: 15%; }
.col-payout  { width: 8%; }
.col-years   { width: 8%; }
.col-drop    { width: 9%; }
.col-tier    { width: 9%; }
.cell-score { font-weight: 700; white-space: nowrap; }
.score-hi { color: var(--red); }
.score-mid { color: #c27803; }
.score-lo { color: #888; }
.score-label { display: block; font-size: 11px; font-weight: 400; color: #999; }
.priority-badge {
  display: inline-block;
  margin-left: 6px;
  padding: 1px 5px;
  border-radius: 8px;
  color: #9a6400;
  background: #fff2cc;
  font-size: 10px;
  font-weight: 600;
  vertical-align: 1px;
}
.stock-table thead th small { font-weight: 400; font-size: 11px; color: #aaa; }

/* 名称列：简称 + 代码 */
.cell-name { text-align: left; padding-left: 10px !important; }
.stock-name { font-weight: 600; color: var(--text); display: block; }
.stock-code { font-size: 11px; color: var(--text-gray); display: block; margin-top: 2px; }

.cell-price { font-weight: 600; }

/* 股息率三行：新/均/低 */
.yield-line { line-height: 1.5; text-align: left; padding-left: 6px; white-space: nowrap; }
.yield-line .lbl { color: var(--text-gray); font-size: 11px; margin-right: 3px; }

/* 三档价格（首/加/重各占一列） */
.cell-tier { font-weight: 600; }
.tier-red { color: var(--red); font-weight: 700; }        /* 触发档位红字 */

/* 需跌幅(首) */
.cell-drop { white-space: nowrap; }
.drop-need { color: #333; }
.drop-hit { color: var(--red); font-weight: 700; }

.empty-tip { text-align: center; color: var(--text-gray); padding: 40px 20px; font-size: 13px; }

/* ---------- 半年内即将分红 ---------- */
.upcoming { border-top: 8px solid #f2f2f2; margin-top: 4px; padding: 14px 0 4px; }
.upcoming-head { display: flex; align-items: baseline; gap: 10px; padding: 0 12px 8px; }
.upcoming-head h3 { font-size: 15px; font-weight: 700; }
.upcoming-sub { font-size: 12px; color: var(--text-gray); }
.up-table { width: 100%; border-collapse: collapse; min-width: 640px; }
.up-table thead th {
  position: sticky; top: 0; z-index: 5;
  background: var(--header-bg); color: #666; font-weight: 600; font-size: 12px;
  text-align: center; padding: 9px 6px; border-bottom: 1px solid var(--line); white-space: nowrap;
}
.up-table tbody td {
  padding: 9px 6px; text-align: center; font-size: 12px;
  border-bottom: 1px solid var(--line); white-space: nowrap;
}
.up-table .up-code { color: var(--text-gray); }
.up-table .cell-plan { text-align: left; white-space: nowrap; color: #555; }
.up-table .col-plan { text-align: left; }

/* ---------- 免责声明 ---------- */
.disclaimer {
  font-size: 11px; color: #bbb; text-align: center;
  padding: 10px 16px 16px; line-height: 1.5; border-top: 1px solid var(--line);
}

/* ---------- 详情弹窗 ---------- */
.modal-mask {
  position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 50;
  display: flex; align-items: flex-end; justify-content: center;
}
.modal {
  background: #fff; width: 100%; max-width: 520px; border-radius: 16px 16px 0 0;
  max-height: 80vh; display: flex; flex-direction: column; animation: slideUp .2s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 16px; border-bottom: 1px solid var(--line); font-weight: 700;
}
.modal-close { font-size: 24px; color: #999; cursor: pointer; line-height: 1; }
.modal-body { padding: 14px 16px; overflow-y: auto; }
.detail-section { margin-bottom: 16px; }
.detail-section h4 { font-size: 13px; color: #666; margin-bottom: 8px; }
.detail-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.detail-box { background: #f7f7f7; border-radius: 8px; padding: 10px; text-align: center; }
.detail-box .k { font-size: 11px; color: #999; }
.detail-box .v { font-size: 15px; font-weight: 700; margin-top: 4px; }
.detail-box .v.red { color: var(--red); }
.detail-box .g { font-size: 11px; color: #888; margin-top: 2px; }
.div-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.div-table th, .div-table td { border-bottom: 1px solid var(--line); padding: 6px; text-align: center; }
.div-table th { color: #999; font-weight: 600; }

/* ---------- Toast ---------- */
.toast {
  position: fixed; left: 50%; bottom: 60px; transform: translateX(-50%);
  background: rgba(0,0,0,.8); color: #fff; padding: 10px 18px; border-radius: 20px;
  font-size: 13px; z-index: 100; max-width: 80%; text-align: center;
}

/* 静态页补充样式 */
.gen-tip { font-size: 11px; color: var(--text-gray); }
#appRoot.locked { display: none !important; }
.gate-mask {
  position: fixed; inset: 0; z-index: 200; background: #f7f7f7;
  display: flex; align-items: center; justify-content: center; padding: 24px;
}
.gate-box {
  width: 100%; max-width: 340px; background: #fff; border: 1px solid #eee;
  border-radius: 12px; padding: 28px 22px; text-align: center;
}
.gate-box h2 { font-size: 18px; margin-bottom: 8px; }
.gate-box p { font-size: 13px; color: #888; margin-bottom: 16px; }
.gate-box input {
  width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px;
  font-size: 15px; margin-bottom: 12px;
}
.gate-box button {
  width: 100%; padding: 10px; border: none; border-radius: 8px;
  background: #c62828; color: #fff; font-size: 15px; cursor: pointer;
}
.gate-err { color: #c62828; font-size: 12px; min-height: 18px; margin-top: 8px; }
.stock-table tbody tr.row-main { cursor: pointer; }
.stock-table tbody tr.row-main.expanded { background: #f7f7f7; }
.stock-table tbody tr.row-expand td { padding: 0 10px 12px; text-align: left; background: #fafafa; }
.metrics-box { display: grid; gap: 12px; padding: 14px; background: #f4f6f8; border: 1px solid #e5e8ec; border-radius: 12px; }
.metric-summary { display: grid; grid-template-columns: 1.4fr repeat(4,1fr); gap: 8px; }
.metric-summary>div { display:flex; flex-direction:column; justify-content:center; min-height:54px; padding:8px 12px; background:#fff; border:1px solid #e6e8eb; border-radius:10px; }
.metric-summary strong { font-size:15px; color:#222; }
.metric-summary small { margin-top:3px; color:#888; font-size:11px; }
.metric-summary .metric-score strong { font-size:22px; }
.metric-section { padding:10px 12px 12px; background:#fff; border:1px solid #e6e8eb; border-radius:10px; }
.metric-section h4 { margin:0 0 9px; font-size:13px; color:#333; }
.metric-grid { display:flex; flex-wrap:wrap; gap:7px; }
.metric-pill { display: inline-block; background: #fff; border: 1px solid #e6e6e6; border-radius: 14px; padding: 5px 10px; font-size: 12px; color: #333; white-space: nowrap; }
.metric-pill b { font-weight: 600; color: #666; margin-right: 4px; }
.metric-good { color:#287a48; background:#f2fbf5; border-color:#cde9d6; }
.metric-warn { color:#986400; background:#fff9e9; border-color:#eedda9; }
.metric-bad { color:#b33a32; background:#fff4f3; border-color:#efcfcc; }
.metric-pill.metric-good b,.metric-pill.metric-warn b,.metric-pill.metric-bad b { color:inherit; }
.metric-foot { display:flex; align-items:center; justify-content:space-between; gap:12px; color:#888; font-size:11px; }
.row-priority { box-shadow:inset 3px 0 0 #d9a441; }
.priority-badge { display:inline-block; margin-left:6px; padding:1px 5px; border-radius:8px; color:#9a6400; background:#fff2cc; font-size:10px; font-weight:600; vertical-align:1px; }
@media(max-width:720px){.metric-summary{grid-template-columns:1fr 1fr}.metric-foot{align-items:flex-start;flex-direction:column}}
.cell-score { font-weight: 700; white-space: nowrap; }
.score-hi { color: #d81e06; }
.score-mid { color: #c27803; }
.score-lo { color: #888; }
.score-label { display: block; font-size: 11px; font-weight: 400; color: #999; }
</style>
</head>

  <div class="gate-mask" id="gateMask" style="display:none;">
    <div class="gate-box">
      <h2>高股息选股</h2>
      <p>请输入访问密码</p>
      <input id="gateInput" type="password" placeholder="访问密码" autocomplete="current-password" />
      <button type="button" id="gateBtn">进入</button>
      <div class="gate-err" id="gateErr"></div>
    </div>
  </div>

  <div id="appRoot">
  <header class="topbar">
    <div class="title-row">
      <span class="app-title">5/6/7 股息梯度选股</span>
      <span class="trade-date" id="tradeDate">--</span>
    </div>
    <div class="filter-row" id="filterRow"></div>
    <div class="action-row">
      <input id="searchInput" class="search-input" type="search"

      <span style="flex:1"></span>

  <div id="captureArea">
    <main class="table-wrap" id="tableWrap">
      <table class="stock-table">
        <thead>
          <tr>
            <th class="col-name">名称/代码</th>
            <th class="col-score">评分</th>
            <th class="col-price">最新价</th>
            <th class="col-yield">股息率<br><small>新/均/低</small></th>
            <th class="col-payout">分红率</th>
            <th class="col-years">连续分红<br><small>(年)</small></th>
            <th class="col-drop">需跌幅<br><small>(首)</small></th>
            <th class="col-tier">首仓价<br><small>(5%)</small></th>
            <th class="col-tier">加仓价<br><small>(6%)</small></th>
            <th class="col-tier">重仓价<br><small>(7%)</small></th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div id="emptyTip" class="empty-tip" style="display:none;">暂无选股数据。</div>
    </main>

    <section class="upcoming" id="upcoming">
      <div class="upcoming-head">
        <h3>半年内即将分红</h3>
        <span class="upcoming-sub" id="upcomingSub">按除权除息日正序</span>
      </div>
      <div class="table-wrap">
        <table class="up-table">
          <thead>
            <tr>
              <th>除权除息日</th><th>股票</th><th>代码</th>
              <th>每股派现</th><th>股息率</th><th>进度</th>
              <th class="col-plan">方案</th>
            </tr>
          </thead>
          <tbody id="upcomingBody"></tbody>
        </table>
        <div id="upcomingEmpty" class="empty-tip" style="display:none;">暂无即将分红数据。</div>
      </div>
    </section>
  </div>

  <footer class="disclaimer" id="disclaimer"></footer>

  <div class="modal-mask" id="modalMask" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <span id="modalTitle">个股详情</span>
        <span class="modal-close" id="modalClose">×</span>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <div class="toast" id="toast" style="display:none;"></div>
  </div><!-- /appRoot -->

      if(name==="核心") btn.classList.add("chip-core");
      btn.textContent=name;
      btn.addEventListener("click",()=>{ state.filter=name; renderFilters(); updateTitle(); renderTable(); });
      row.appendChild(btn);
    }
  }

  function renderUpcoming(){
    const body=document.getElementById("upcomingBody"), empty=document.getElementById("upcomingEmpty");
    const items=DATA.upcoming||[];
    document.getElementById("upcomingSub").textContent=`按除权除息日正序 · 条数：${items.length}`;
    body.innerHTML="";
    if(!items.length){ empty.style.display="block"; return; } empty.style.display="none";
    for(const it of items){
      const tr=document.createElement("tr");
      tr.innerHTML=`<td>${it.ex_date||"-"}</td><td>${it.name||""}</td><td class="up-code">${it.code}</td>
        <td>${it.per_share==null?"-":Number(it.per_share).toFixed(4)}</td>
        <td>${it.yield_pct==null?"-":Number(it.yield_pct).toFixed(2)+"%"}</td>
        <td>${it.progress||"-"}</td><td class="cell-plan">${it.plan||"-"}</td>`;
      body.appendChild(tr);
    }
  }

  function openDetail(r){
    const mask=document.getElementById("modalMask"), body=document.getElementById("modalBody");
    document.getElementById("modalTitle").textContent=`${r.name||""} ${r.code}`;
    const gap=(t)=> (r.price&&t)?((t-r.price)/r.price*100):null;
    const gapTxt=(g)=> g==null?"":`<div class="g">${g>=0?"距目标 +"+g.toFixed(2)+"%":"已达 "+Math.abs(g).toFixed(2)+"%"}</div>`;
    const box=(k,v,g,red)=>`<div class="detail-box"><div class="k">${k}</div><div class="v ${red?"red":""}">${num(v)}</div>${gapTxt(g)}</div>`;
    const divs=(DATA.dividends&&DATA.dividends[r.code])||[];
    let divRows=""; for(const it of divs){ divRows+=`<tr><td>${it.year}</td><td>${num(it.dps)}</td><td>${it.eps==null?"-":num(it.eps)}</td></tr>`; }
    body.innerHTML=`
      <div class="detail-section">
        <h4>当前 现价 ${num(r.price)}　股息率 新 ${pct(r.yield_new_pct)} / 均 ${pct(r.yield_avg_pct)} / 低 ${pct(r.yield_low_pct)}</h4>
        <div class="detail-grid">
          ${box("首仓价(5%)",r.price_first,gap(r.price_first),true)}
          ${box("加仓价(6%)",r.price_add,gap(r.price_add),false)}
          ${box("重仓价(7%)",r.price_heavy,gap(r.price_heavy),false)}
        </div>
      </div>
      <div class="detail-section">
        <h4>历年现金分红（每股，元）</h4>
        <table class="div-table"><thead><tr><th>年度</th><th>每股分红</th><th>每股收益</th></tr></thead>
        <tbody>${divRows||'<tr><td colspan="3">暂无数据</td></tr>'}</tbody></table>
      </div>`;
    mask.style.display="flex";
  }

  document.getElementById("modalClose").addEventListener("click",()=>document.getElementById("modalMask").style.display="none");
  document.getElementById("modalMask").addEventListener("click",(e)=>{ if(e.target.id==="modalMask") e.currentTarget.style.display="none"; });

  document.getElementById("saveImgBtn").addEventListener("click",async()=>{
    if(typeof html2canvas!=="function"){ toast("图片库未加载（保存图片需联网）"); return; }
    toast("正在生成图片…");
    try{
      const target=document.getElementById("captureArea");
      const canvas=await html2canvas(target,{backgroundColor:"#fff",scale:(window.devicePixelRatio>1?2:1.5),useCORS:true,windowWidth:target.scrollWidth});
      const a=document.createElement("a");
      a.download=`高股息选股_${(DATA.trade_date||"latest")}.png`;
      a.href=canvas.toDataURL("image/png"); a.click(); toast("图片已保存");
    }catch(e){ toast("生成失败："+e.message); }
  });

  function bootApp(){
    document.getElementById("searchInput").addEventListener("input",(e)=>{
      state.q=e.target.value||""; updateTitle(); renderTable();
    });
    updateTitle();
    document.getElementById("genTip").textContent = "数据快照 · 生成于 "+(DATA.generated_at||"");
    document.getElementById("disclaimer").textContent = DATA.disclaimer||"";
    renderFilters(); renderTable(); renderUpcoming();
  }

  tryGate();
  </script>
</body>
</html>
